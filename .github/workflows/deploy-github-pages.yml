name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5

            - name: Use GitHub Actions for Pages builds
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh api "repos/${{ github.repository }}/pages" -X PUT -f build_type=workflow

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - name: Build static site
              env:
                  BASE_PATH: /${{ github.event.repository.name }}
                  NEXT_OUTPUT: export
              run: npm run build

            - name: Disable Jekyll
              run: touch out/.nojekyll

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
